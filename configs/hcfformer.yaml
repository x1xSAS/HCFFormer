project:
  name: HCFFormer
  seed: 42

data:
  root: datasets
  dataset: Texas
  train_split: 0.70
  val_split: 0.10
  test_split: 0.20
  patch_size: 128
  normalization: min_max
  augmentation:
    horizontal_flip: true
    vertical_flip: true
    rotation: [90, 180, 270]
    gaussian_noise: true
    brightness_variation: true
    random_crop: true

model:
  embed_dim: 128
  attention_heads: 8
  mlp_ratio: 4
  dropout: 0.1
  patch_embed_size: 4

training:
  optimizer: AdamW
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 8
  epochs:
    Texas: 200
    California: 250
    Shuguang: 300
  gradient_clipping: 1.0
  scheduler: CosineAnnealingLR
  mixed_precision: true

loss:
  lambda_kl: 0.5
  lambda_ssim: 0.5
  lambda_cos: 0.5
  lambda_sem: 0.5

paths:
  weights_dir: weights
  runs_dir: runs
