name: hcfformer
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib
  - scikit-learn
  - scikit-image
  - pyyaml
  - pillow
  - pip:
      - torch==2.0.0
      - torchvision
      - torchaudio
      - opencv-python>=4.7
      - tqdm
      - einops
      - networkx
      - albumentations
      - tensorboard
